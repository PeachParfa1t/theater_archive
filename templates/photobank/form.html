{% extends 'base.html' %}
{% block title %}Добавить фото — Фотобанк{% endblock %}
{% block page_title %}Фотобанк: добавить фото{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card">
  <div class="card-header"><i class="bi bi-camera"></i> Фото без привязки к спектаклю</div>
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Тип материала</label>
          <select name="material_type" class="form-select">
            <option value="photo" selected>📷 Фотография</option>
            <option value="poster">📋 Афиша</option>
            <option value="sketch">🎨 Эскиз</option>
            <option value="video">🎬 Видео</option>
            <option value="media_article">📰 Статья СМИ</option>
            <option value="program">📄 Программка</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Название (необязательно)</label>
          <input type="text" name="title" class="form-control" placeholder="Например: Труппа на выезде, 2023">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Файл</label>
          <input type="file" name="mat_file" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Или ссылка (URL)</label>
          <input type="url" name="url" class="form-control" placeholder="https://...">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Кто на фото (необязательно)</label>
          <input type="text" id="artistFilter" class="form-control form-control-sm mb-2" placeholder="Поиск артиста...">
          <div class="border rounded p-2" id="artistCheckboxes" style="max-height:220px;overflow-y:auto">
            {% for a in artists %}
            <div class="form-check">
              <input type="checkbox" class="form-check-input" name="artist_ids" value="{{ a.id }}" id="a{{ a.id }}">
              <label class="form-check-label" for="a{{ a.id }}">{{ a.full_name }}{% if a.title %} <small class="text-muted">({{ a.title }})</small>{% endif %}</label>
            </div>
            {% endfor %}
          </div>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-imt"><i class="bi bi-check-lg"></i> Добавить</button>
          <a href="{{ url_for('photobank.list_photobank') }}" class="btn btn-outline-secondary">Отмена</a>
        </div>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}
{% block scripts %}
<script>initCheckboxFilter('artistFilter', 'artistCheckboxes');</script>
{% endblock %}
