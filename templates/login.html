<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — Цифровой архив ИМТ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#8A4F9F 0%,#3a2647 50%,#00B6D2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo h2{color:#241b2e;font-weight:700;margin:.5rem 0 .2rem;}
.login-logo p{color:#888;font-size:.85rem;}
.btn-login{background:#00B6D2;border:none;width:100%;padding:.75rem;font-size:1rem;font-weight:600;border-radius:8px;}
.btn-login:hover{background:#0090a8;}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div style="font-size:3rem;">🎭</div>
    <h2>Архив ИМТ</h2>
    <p>Иркутский музыкальный театр им. Н.М. Загурского</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 mb-3">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Логин</label>
      <input type="text" name="login" class="form-control form-control-lg" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Пароль</label>
      <input type="password" name="password" class="form-control form-control-lg" required>
    </div>
    <button type="submit" class="btn btn-login text-white">Войти</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
